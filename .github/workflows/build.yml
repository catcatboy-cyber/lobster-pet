name: Build Android APK

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --info || true
        echo "=== Checking for APK ==="
        find . -name "*.apk" -type f 2>/dev/null
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || true
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'push'
      with:
        tag_name: v1.0.0-debug
        name: Lobster Pet Debug APK
        body: 语音龙虾桌面宠物 - Debug 版本
        files: |
          app/build/outputs/apk/debug/*.apk
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: lobster-pet-apk
        path: |
          app/build/outputs/apk/**/*.apk
          **/build/outputs/apk/**/*.apk
        retention-days: 30
        if-no-files-found: warn

name: Build Android APK

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check files exist
      run: |
        echo "=== 检查关键文件 ==="
        ls -la
        echo "=== 检查 gradlew ==="
        ls -la gradlew
        file gradlew
        echo "=== 检查 gradle wrapper ==="
        ls -la gradle/wrapper/
        head -5 gradlew
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Fix gradlew permissions
      run: |
        chmod +x gradlew
        git update-index --chmod=+x gradlew || true
    
    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug
      continue-on-error: false
    
    - name: Verify APK exists
      run: |
        echo "=== 查找 APK ==="
        find . -name "*.apk" -type f 2>/dev/null || true
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || (echo "目录不存在" && exit 1)
    
    - name: Rename APK
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk lobster-pet.apk
        ls -lh lobster-pet.apk
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0-debug
        name: Lobster Pet Debug APK
        body: |
          语音龙虾桌面宠物 - Debug 版本
          构建时间: ${{ github.run_id }}-${{ github.run_number }}
        files: lobster-pet.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

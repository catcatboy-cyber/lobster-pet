name: Build Android APK

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build APK
      run: |
        # 确保 gradlew 可执行
        chmod +x gradlew
        
        # 构建 APK
        ./gradlew assembleDebug --info --stacktrace 2>&1 | tee build.log
        
        # 检查构建结果
        echo "=== 检查构建输出 ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK目录不存在"
        
        # 如果 APK 不存在，输出错误日志
        if [ ! -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "❌ APK 构建失败"
          tail -100 build.log
          exit 1
        fi
        
        echo "✅ APK 构建成功"
        ls -lh app/build/outputs/apk/debug/app-debug.apk
    
    - name: Rename APK
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk lobster-pet.apk
        ls -lh lobster-pet.apk
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0-debug
        name: Lobster Pet Debug APK
        body: |
          语音龙虾桌面宠物 - Debug 版本
          构建时间: ${{ github.run_id }}-${{ github.run_number }}
        files: lobster-pet.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

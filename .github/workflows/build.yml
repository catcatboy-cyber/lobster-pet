name: Build Android APK

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build Debug APK
      run: |
        set -e  # 确保任何命令失败都会停止
        ./gradlew assembleDebug --info 2>&1
        
    - name: Verify APK exists
      run: |
        set -e
        echo "=== 查找所有APK文件 ==="
        find . -name "*.apk" -type f 2>/dev/null || true
        
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ APK文件已生成"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
        else
          echo "❌ APK文件未找到！"
          ls -la app/build/outputs/apk/ 2>/dev/null || true
          exit 1
        fi
    
    - name: Rename APK with timestamp
      run: |
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          cp app/build/outputs/apk/debug/app-debug.apk lobster-pet-${TIMESTAMP}.apk
          echo "APK已重命名为 lobster-pet-${TIMESTAMP}.apk"
        fi
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0-debug
        name: Lobster Pet Debug APK
        body: |
          语音龙虾桌面宠物 - Debug 版本
          构建时间: ${{ github.run_id }}-${{ github.run_number }}
        files: |
          lobster-pet-*.apk
          app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload Artifact for debug
      if: failure()  # 即使失败也上传日志
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ github.run_number }}
        path: |
          app/build/outputs/
          app/build/reports/
        retention-days: 5
